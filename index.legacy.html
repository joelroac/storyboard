            {canEditCaption ? (
              <>
                <textarea
                  value={captionDraft}
                  onChange={e => setCaptionDraft(e.target.value)}
                  rows={5}
                  placeholder="Write caption here..."
                  style={{ width: '100%', resize: 'vertical', background: 'rgba(255,255,255,.03)', border: '1px solid rgba(255,255,255,.08)', color: '#d4d4d8', borderRadius: 8, padding: '10px 12px', outline: 'none', fontSize: 13, lineHeight: 1.6, fontFamily: "'Inter',sans-serif" }}
                />
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 8 }}>
                  <button className="btn-amber" onClick={handleSaveCaption} style={{ fontSize: 12, padding: '6px 14px' }}>
                    {isTiana && proj.status === 'Caption Needed' ? 'Submit Caption' : 'Save Caption'}
                  </button>
                  {captionSaved && <span style={{ fontSize: 12, color: '#4ade80' }}>Saved ✓</span>}
                </div>
              </>
            ) : (
              <div style={{ fontSize: 13, color: '#d4d4d8', lineHeight: 1.6, padding: '10px 12px', background: 'rgba(255,255,255,.02)', borderRadius: 8 }}>
                {proj.caption || <span style={{ color: '#52525b' }}>No caption yet.</span>}
              </div>
            )}
          </div>
        )}

        {/* Script + Shot List */}
        <div>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
            <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', color: '#52525b' }}>Script / Talking Points</div>
            {isJoel && (
              <button onClick={handlePDFExport} style={{ fontSize: 11, padding: '3px 9px', background: 'rgba(255,255,255,.05)', border: '1px solid rgba(255,255,255,.1)', color: '#a1a1aa', borderRadius: 6 }}>
                Export PDF ↓
              </button>
            )}
          </div>
          {canEditScript ? (
            <>
              <textarea
                value={scriptDraft}
                onChange={e => handleScriptChange(e.target.value)}
                className="script-area"
                placeholder="Write your script, key points, or talking points here..."
                style={{ width: '100%', minHeight: 200, resize: 'vertical', background: 'rgba(255,255,255,.03)', border: '1px solid rgba(255,255,255,.08)', color: '#d4d4d8', borderRadius: 8, padding: '10px 12px', outline: 'none', fontSize: 13 }}
              />
              <div style={{ fontSize: 11, color: '#52525b', marginTop: 4 }}>
                {scriptUnsaved ? 'Unsaved changes...' : scriptSavedAt ? `Last saved ${timeAgo(scriptSavedAt)}` : ''}
              </div>
            </>
          ) : (
            <div style={{ fontSize: 13, color: '#d4d4d8', lineHeight: 1.7, padding: '10px 12px', background: 'rgba(255,255,255,.02)', borderRadius: 8, minHeight: 80, fontFamily: "'Inter',monospace" }}>
              {proj.script || <span style={{ color: '#52525b' }}>No script added.</span>}
            </div>
          )}
        </div>

        {/* Shot List */}
        {canEditScript && (
          <div>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
              <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', color: '#52525b' }}>Shot List</div>
              <button onClick={() => {
                const newShot = { id: 's' + Date.now(), desc: '', type: 'Wide', notes: '' };
                updateProject(proj.id, { shotList: [...(proj.shotList || []), newShot] });
              }} style={{ fontSize: 11, padding: '3px 9px', background: 'rgba(255,255,255,.05)', border: '1px solid rgba(255,255,255,.1)', color: '#a1a1aa', borderRadius: 6 }}>
                + Add Shot
              </button>
            </div>
            {(proj.shotList || []).length === 0 ? (
              <div style={{ fontSize: 12, color: '#52525b', padding: '8px 0' }}>No shots added yet.</div>
            ) : (
              <div style={{ border: '1px solid rgba(255,255,255,.07)', borderRadius: 8, overflow: 'hidden' }}>
                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
                  <thead>
                    <tr style={{ borderBottom: '1px solid rgba(255,255,255,.07)' }}>
                      {['#', 'Description', 'Type', 'Notes', ''].map(h => (
                        <th key={h} style={{ padding: '7px 8px', textAlign: 'left', color: '#52525b', fontWeight: 600, fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.05em' }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {(proj.shotList || []).map((shot, i) => (
                      <tr key={shot.id} style={{ borderBottom: '1px solid rgba(255,255,255,.04)' }}>
                        <td style={{ padding: '6px 8px', color: '#52525b', width: 24 }}>{i + 1}</td>
                        <td style={{ padding: '4px 8px' }}>
                          <input value={shot.desc} onChange={e => {
                            const updated = (proj.shotList || []).map(s => s.id === shot.id ? { ...s, desc: e.target.value } : s);
                            updateProject(proj.id, { shotList: updated });
                          }} placeholder="Description..." style={{ fontSize: 12, padding: '3px 6px' }} />
                        </td>
                        <td style={{ padding: '4px 8px', width: 90 }}>
                          <select value={shot.type} onChange={e => {
                            const updated = (proj.shotList || []).map(s => s.id === shot.id ? { ...s, type: e.target.value } : s);
                            updateProject(proj.id, { shotList: updated });
                          }} style={{ fontSize: 11, padding: '3px 4px' }}>
                            {['Wide', 'Medium', 'Close', 'B-Roll'].map(t => <option key={t} value={t}>{t}</option>)}
                          </select>
                        </td>
                        <td style={{ padding: '4px 8px' }}>
                          <input value={shot.notes} onChange={e => {
                            const updated = (proj.shotList || []).map(s => s.id === shot.id ? { ...s, notes: e.target.value } : s);
                            updateProject(proj.id, { shotList: updated });
                          }} placeholder="Notes..." style={{ fontSize: 12, padding: '3px 6px' }} />
                        </td>
                        <td style={{ padding: '4px 8px', width: 28 }}>
                          <button onClick={() => updateProject(proj.id, { shotList: (proj.shotList || []).filter(s => s.id !== shot.id) })}
                            style={{ background: 'none', border: 'none', color: '#52525b', display: 'flex', alignItems: 'center' }}>
                            <TrashIcon size={12} />
                          </button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        )}

        {/* Notes */}
        <div>
          <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', color: '#52525b', marginBottom: 8 }}>Notes</div>
          <textarea
            value={proj.notes || ''}
            onChange={e => updateProject(proj.id, { notes: e.target.value })}
            rows={3}
            placeholder="Internal notes..."
            style={{ width: '100%', resize: 'vertical', background: 'rgba(255,255,255,.03)', border: '1px solid rgba(255,255,255,.08)', color: '#d4d4d8', borderRadius: 8, padding: '10px 12px', outline: 'none', fontSize: 13, lineHeight: 1.6, fontFamily: "'Inter',sans-serif" }}
          />
        </div>

        {/* Schedule (Joel, Ready to Post / Ready to Send) */}
        {isJoel && (proj.status === 'Ready to Post' || proj.status === 'Ready to Send') && (
          <div>
            <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', color: '#52525b', marginBottom: 8 }}>Schedule Post</div>
            <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
              <input type="datetime-local" value={scheduleTime} onChange={e => setScheduleTime(e.target.value)} style={{ flex: 1, fontSize: 13 }} />
              <button className="btn-amber" onClick={handleSchedule} style={{ whiteSpace: 'nowrap', fontSize: 12 }}>Schedule</button>
            </div>
          </div>
        )}

        {/* Revision Request (Joel on Edit Review) */}
        {isJoel && proj.status === 'Edit Review' && (
          <button
            onClick={() => advanceStatus(proj.id, 'Revision Requested', uid)}
            style={{ background: 'rgba(248,113,113,.1)', border: '1px solid rgba(248,113,113,.25)', color: '#f87171', borderRadius: 8, padding: '8px 14px', fontSize: 12 }}>
            Request Revision
          </button>
        )}

        {/* Action Button */}
        {actionBtn && (
          <button
            onClick={() => {
              advanceStatus(proj.id, actionBtn.next, uid);
              if (isTiana && (actionBtn.next === 'Posted' || actionBtn.next === 'Sent')) {
                addNotification({ type: 'posted', message: `${getTeamName(uid)} published "${proj.title}"`, projectId: proj.id, user: 'joel' });
              }
            }}
            style={{ width: '100%', padding: '10px', background: actionBtn.color || '#f59e0b', color: actionBtn.color ? 'white' : '#0c0c0e', border: 'none', borderRadius: 8, fontWeight: 600, fontSize: 13 }}>
            {actionBtn.label}
          </button>
        )}

        {/* Timeline */}
        <div>
          <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', color: '#52525b', marginBottom: 8 }}>Activity</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {(proj.timeline || []).slice().reverse().map((entry, i) => (
              <div key={i} style={{ display: 'flex', gap: 10, fontSize: 12 }}>
                <div style={{ width: 6, height: 6, borderRadius: 3, background: '#27272a', marginTop: 5, flexShrink: 0 }} />
                <div style={{ flex: 1 }}>
                  <span style={{ color: '#d4d4d8' }}>{entry.action}</span>
                  {entry.user && entry.user !== 'system' && <span style={{ color: '#71717a' }}> by {getTeamName(entry.user)}</span>}
                  {entry.user === 'system' && <span style={{ color: '#71717a' }}> (auto)</span>}
                  <div style={{ color: '#52525b', fontSize: 10, marginTop: 2 }}>{timeAgo(entry.date)}</div>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Delete (Joel only) */}
        {isJoel && (
          <div style={{ marginTop: 8, paddingTop: 16, borderTop: '1px solid rgba(255,255,255,.06)' }}>
            {!confirmDelete ? (
              <button
                onClick={() => setConfirmDelete(true)}
                style={{ background: 'rgba(239,68,68,.1)', color: '#f87171', border: '1px solid rgba(239,68,68,.25)', borderRadius: 8, padding: '8px 14px', fontSize: 12, width: '100%' }}>
                Delete Project
              </button>
            ) : (
              <div style={{ background: 'rgba(239,68,68,.07)', border: '1px solid rgba(239,68,68,.2)', borderRadius: 8, padding: 12 }}>
                <div style={{ fontSize: 12, color: '#f87171', marginBottom: 10 }}>This will permanently delete this project.</div>
                <div style={{ display: 'flex', gap: 8 }}>
                  <button onClick={handleDelete} style={{ flex: 1, background: 'rgba(239,68,68,.2)', color: '#f87171', border: '1px solid rgba(239,68,68,.3)', borderRadius: 6, padding: '7px', fontSize: 12 }}>Confirm Delete</button>
                  <button onClick={() => setConfirmDelete(false)} className="btn-ghost" style={{ flex: 1, fontSize: 12 }}>Cancel</button>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Joel Dashboard ─────────────────────────────────────────────────────────────
function JoelDashboard() {
  const { projects, setSelectedProject, addProject, advanceStatus, deleteProject, getTeamName, getWorkflow, getStageOwner, currentUser, notifications, markNotifRead, markAllRead, clearNotifications, logout } = useContext(AppContext);
  const [activeTab, setActiveTab] = useState('dashboard');
  const [showAdd, setShowAdd] = useState(false);
  const [showNotif, setShowNotif] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [dragOverCol, setDragOverCol] = useState(null);
  const [deletingId, setDeletingId] = useState(null);

  const unread = notifications.filter(n => !n.read && (!n.user || n.user === 'joel')).length;

  const kanbanGroups = [
    { label: 'In Production', statuses: ['Filming', 'Raw Footage Ready', 'Drafting'] },
    { label: 'Editing', statuses: ['Editing in Progress', 'In Review', 'Revision Requested'] },
    { label: 'Caption Stage', statuses: ['Edit Review', 'Final Review', 'Caption Needed', 'Caption In Review'] },
    { label: 'Going Live', statuses: ['Ready to Post', 'Ready to Send', 'Scheduled'] },
  ];

  const activeProjects = projects.filter(p => p.status !== 'Posted' && p.status !== 'Sent');

  const handleKanbanDrop = (e, group) => {
    e.preventDefault();
    const projectId = e.dataTransfer.getData('projectId');
    if (!projectId) { setDragOverCol(null); return; }
    const proj = projects.find(p => p.id === projectId);
    if (!proj) { setDragOverCol(null); return; }
    const wf = getWorkflow(proj.type);
    let newStatus = null;
    for (const gs of group.statuses) {
      if (wf.includes(gs)) { newStatus = gs; break; }
    }
    if (newStatus && newStatus !== proj.status) {
      advanceStatus(projectId, newStatus, 'joel');
    }
    setDragOverCol(null);
  };

  const readyProjects = projects.filter(p => p.status === 'Ready to Post' || p.status === 'Ready to Send');
  const scheduledProjects = projects.filter(p => p.status === 'Scheduled').sort((a, b) => {
    const aTime = a.scheduledTime ? new Date(a.scheduledTime) : (a.publishDate ? new Date(a.publishDate + 'T23:59:00') : new Date(9999, 0, 1));
    const bTime = b.scheduledTime ? new Date(b.scheduledTime) : (b.publishDate ? new Date(b.publishDate + 'T23:59:00') : new Date(9999, 0, 1));
    return aTime - bTime;
  });

  const countdownText = (proj) => {
    const target = proj.scheduledTime ? new Date(proj.scheduledTime) : (proj.publishDate ? new Date(proj.publishDate + 'T12:00:00') : null);
    if (!target) return null;
    const diff = target.getTime() - Date.now();
    if (diff < 0) return { text: 'Should be live now', color: '#f59e0b' };
    const hours = Math.floor(diff / 3600000);
    if (hours < 1) return { text: 'Going live today', color: '#4ade80' };
    if (hours < 24) return { text: `Going live in ${hours}h`, color: '#4ade80' };
    const days = Math.floor(hours / 24);
    return { text: `Going live in ${days} day${days === 1 ? '' : 's'}`, color: '#4ade80' };
  };

  return (
    <div style={{ minHeight: '100vh', background: '#0c0c0e' }}>
      {/* Header */}
      <div style={{ borderBottom: '1px solid rgba(255,255,255,.07)', padding: '0 24px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', height: 54, position: 'sticky', top: 0, background: '#0c0c0e', zIndex: 30 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 20 }}>
          <div className="font-display" style={{ fontSize: 18, color: '#f59e0b' }}>Storyboard</div>
          <div style={{ display: 'flex', gap: 2 }}>
            {[{ id: 'dashboard', label: 'Dashboard' }, { id: 'calendar', label: 'Calendar' }].map(t => (
              <button key={t.id} onClick={() => setActiveTab(t.id)} style={{ padding: '6px 14px', borderRadius: 6, background: activeTab === t.id ? 'rgba(255,255,255,.07)' : 'transparent', border: 'none', color: activeTab === t.id ? '#f4f4f5' : '#71717a', fontSize: 13, fontWeight: activeTab === t.id ? 500 : 400 }}>
                {t.label}
              </button>
            ))}
          </div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          {/* User chip */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '4px 10px', background: 'rgba(245,158,11,.08)', border: '1px solid rgba(245,158,11,.2)', borderRadius: 20 }}>
            <div style={{ width: 20, height: 20, borderRadius: 10, background: '#f59e0b', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, fontWeight: 700, color: '#0c0c0e' }}>
              {getTeamName('joel')[0]}
            </div>
            <span style={{ fontSize: 12, color: '#f59e0b', fontWeight: 500 }}>{getTeamName('joel')}</span>
          </div>
          <button onClick={() => setShowSettings(true)} title="Settings" style={{ background: 'none', border: 'none', color: '#52525b', padding: '4px 8px', display: 'flex', alignItems: 'center' }}><GearIcon size={17} /></button>
          <button onClick={() => setShowNotif(s => !s)} style={{ position: 'relative', background: 'none', border: 'none', color: '#52525b', padding: '4px 8px', display: 'flex', alignItems: 'center' }}>
            <BellIcon size={16} />
            {unread > 0 && <span style={{ position: 'absolute', top: -2, right: -2, background: '#f59e0b', color: '#0c0c0e', fontSize: 9, fontWeight: 700, borderRadius: 8, padding: '1px 4px', minWidth: 14, textAlign: 'center' }}>{unread}</span>}
          </button>
          <button className="btn-amber" onClick={() => setShowAdd(true)} style={{ fontSize: 12, padding: '6px 12px' }}>+ New Project</button>
          <button onClick={logout} style={{ background: 'none', border: 'none', color: '#52525b', fontSize: 12 }}>Sign out</button>
        </div>
      </div>

      <div style={{ padding: '20px 24px', maxWidth: 1400, margin: '0 auto' }}>
        {activeTab === 'dashboard' && (
          <>
            {/* Header */}
            <div style={{ marginBottom: 20 }}>
              <div className="font-display" style={{ fontSize: 26, color: '#f4f4f5', marginBottom: 4 }}>
                Good morning, {getTeamName('joel')}
              </div>
              <div style={{ fontSize: 13, color: '#52525b' }}>
                {new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
              </div>
            </div>

            {/* My Review Queue */}
            {(() => {
              const reviewItems = projects.filter(p => JOEL_REVIEW_STAGES.includes(p.status));
              if (reviewItems.length === 0) return null;
              return (
                <div style={{ marginBottom: 20 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
                    <div style={{ width: 8, height: 8, borderRadius: 4, background: '#a78bfa' }} />
                    <div style={{ fontSize: 13, fontWeight: 600, color: '#f4f4f5' }}>My Review Queue</div>
                    <span style={{ background: 'rgba(167,139,250,.2)', color: '#a78bfa', fontSize: 11, fontWeight: 700, borderRadius: 10, padding: '1px 7px' }}>{reviewItems.length}</span>
                  </div>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                    {reviewItems.map(p => (
                      <div key={p.id} onClick={() => setSelectedProject(p)} className="card"
                        style={{ padding: '10px 14px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 10, borderColor: 'rgba(167,139,250,.2)', background: 'rgba(167,139,250,.04)' }}
                        onMouseEnter={e => e.currentTarget.style.borderColor = 'rgba(167,139,250,.4)'}
                        onMouseLeave={e => e.currentTarget.style.borderColor = 'rgba(167,139,250,.2)'}>
                        <PlatformIcon type={p.type} size={14} />
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 13, fontWeight: 500, color: '#f4f4f5' }}>{p.title}</div>
                          <div style={{ fontSize: 11, color: '#71717a', marginTop: 1 }}>{TYPE_LABELS[p.type]}</div>
                        </div>
                        <StatusBadge status={p.status} />
                      </div>
                    ))}
                  </div>
                </div>
              );
            })()}

            {/* Stats row */}
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 12, marginBottom: 24 }}>
              {[
                { label: 'Active Projects', value: activeProjects.length, color: '#f59e0b' },
                { label: 'Ready to Post', value: readyProjects.length, color: '#4ade80' },
                { label: 'Scheduled', value: scheduledProjects.length, color: '#facc15' },
                { label: 'Awaiting Review', value: projects.filter(p => JOEL_REVIEW_STAGES.includes(p.status)).length, color: '#a78bfa' },
              ].map(s => (
                <div key={s.label} className="card" style={{ padding: '14px 16px' }}>
                  <div style={{ fontSize: 22, fontWeight: 700, color: s.color }}>{s.value}</div>
                  <div style={{ fontSize: 11, color: '#71717a', marginTop: 2 }}>{s.label}</div>
                </div>
              ))}
            </div>

            {/* Kanban */}
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 12, marginBottom: 28 }}>
              {kanbanGroups.map(group => {
                const colProjects = activeProjects.filter(p => group.statuses.includes(p.status));
                return (
                  <div key={group.label}
                    className={`kanban-col${dragOverCol === group.label ? ' drag-over' : ''}`}
                    onDragOver={e => { e.preventDefault(); setDragOverCol(group.label); }}
                    onDragLeave={() => setDragOverCol(null)}
                    onDrop={e => handleKanbanDrop(e, group)}
                    style={{ padding: 10, minHeight: 120, borderRadius: 12 }}>
                    <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase', color: '#52525b', marginBottom: 8 }}>
                      {group.label} {colProjects.length > 0 && <span style={{ color: '#3f3f46' }}>({colProjects.length})</span>}
                    </div>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                      {colProjects.map(p => (
                        <div key={p.id}
                          className="kanban-card"
                          draggable
                          onDragStart={e => { e.dataTransfer.setData('projectId', p.id); e.dataTransfer.setData('fromStatus', p.status); }}
                          onClick={() => { if (deletingId !== p.id) setSelectedProject(p); }}>
                          {/* Delete button */}
                          <button
                            onClick={e => { e.stopPropagation(); setDeletingId(deletingId === p.id ? null : p.id); }}
                            style={{ position: 'absolute', top: 5, right: 5, background: 'none', border: 'none', color: '#52525b', padding: '0 2px', zIndex: 1, display: 'flex', alignItems: 'center' }}
                            title="Delete">
                            <TrashIcon size={12} />
                          </button>
                          {/* Inline delete confirm */}
                          {deletingId === p.id && (
                            <div onClick={e => e.stopPropagation()} style={{ position: 'absolute', top: 0, left: 0, right: 0, bottom: 0, background: '#1a1a1e', borderRadius: 8, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 6, zIndex: 2, padding: 8 }}>
                              <div style={{ fontSize: 11, color: '#f87171', textAlign: 'center' }}>Delete this project?</div>
                              <div style={{ display: 'flex', gap: 6 }}>
                                <button onClick={e => { e.stopPropagation(); deleteProject(p.id); setDeletingId(null); }} style={{ background: 'rgba(239,68,68,.2)', border: 'none', color: '#f87171', borderRadius: 4, padding: '4px 8px', fontSize: 11 }}>Yes</button>
                                <button onClick={e => { e.stopPropagation(); setDeletingId(null); }} style={{ background: 'rgba(255,255,255,.06)', border: 'none', color: '#a1a1aa', borderRadius: 4, padding: '4px 8px', fontSize: 11 }}>No</button>
                              </div>
                            </div>
                          )}
                          <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 5 }}>
                            <PlatformIcon type={p.type} size={11} />
                            <span style={{ fontSize: 10, color: '#52525b' }}>{TYPE_LABELS[p.type]}</span>
                          </div>
                          <div style={{ fontSize: 12, fontWeight: 500, color: '#e4e4e7', lineHeight: 1.4, marginBottom: 6, paddingRight: 18 }}>{p.title}</div>
                          <StatusBadge status={p.status} />
                          {/* Mini progress bar */}
                          {(() => {
                            const wf = getWorkflow(p.type);
                            const idx = wf.indexOf(p.status);
                            const pct = wf.length > 1 ? (idx / (wf.length - 1)) * 100 : 100;
                            return (
                              <div style={{ height: 2, background: 'rgba(255,255,255,.06)', borderRadius: 1, marginTop: 6, overflow: 'hidden' }}>
                                <div style={{ height: '100%', width: `${pct}%`, background: getStatusColor(p.status), borderRadius: 1 }} />
                              </div>
                            );
                          })()}
                        </div>
                      ))}
                      {colProjects.length === 0 && (
                        <div style={{ fontSize: 11, color: '#3f3f46', textAlign: 'center', padding: '16px 0' }}>Empty</div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Ready to Post */}
            {readyProjects.length > 0 && (
              <div style={{ marginBottom: 24 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }}>
                  <div style={{ width: 8, height: 8, borderRadius: 4, background: '#4ade80' }} />
                  <div style={{ fontSize: 13, fontWeight: 600, color: '#f4f4f5' }}>Approved — Ready to Post</div>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                  {readyProjects.map(p => (
                    <div key={p.id} onClick={() => setSelectedProject(p)} className="card"
                      style={{ padding: '12px 16px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 12 }}
                      onMouseEnter={e => e.currentTarget.style.borderColor = 'rgba(255,255,255,.14)'}
                      onMouseLeave={e => e.currentTarget.style.borderColor = 'rgba(255,255,255,.06)'}>
                      <PlatformIcon type={p.type} size={16} />
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 13, fontWeight: 500, color: '#f4f4f5' }}>{p.title}</div>
                        <div style={{ fontSize: 11, color: '#71717a', marginTop: 2 }}>{TYPE_LABELS[p.type]} · {formatDateStr(p.publishDate)}</div>
                      </div>
                      <StatusBadge status={p.status} />
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Going Live */}
            <div>
              <div style={{ fontSize: 13, fontWeight: 600, color: '#f4f4f5', marginBottom: 12 }}>Going Live</div>
              {scheduledProjects.length === 0 ? (
                <div style={{ fontSize: 13, color: '#52525b', padding: '16px 0' }}>No scheduled posts.</div>
              ) : (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                  {scheduledProjects.map(p => {
                    const cd = countdownText(p);
                    return (
                      <div key={p.id} onClick={() => setSelectedProject(p)} className="card"
                        style={{ padding: '12px 16px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 12 }}
                        onMouseEnter={e => e.currentTarget.style.borderColor = 'rgba(255,255,255,.14)'}
                        onMouseLeave={e => e.currentTarget.style.borderColor = 'rgba(255,255,255,.06)'}>
                        <PlatformIcon type={p.type} size={16} />
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 13, fontWeight: 500, color: '#f4f4f5' }}>{p.title}</div>
                          <div style={{ fontSize: 11, color: '#71717a', marginTop: 2 }}>
                            {TYPE_LABELS[p.type]} · {p.scheduledTime ? new Date(p.scheduledTime).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }) : formatDateStr(p.publishDate)}
                          </div>
                        </div>
                        {cd && <div style={{ fontSize: 11, fontWeight: 600, color: cd.color, whiteSpace: 'nowrap' }}>{cd.text}</div>}
                        <StatusBadge status={p.status} />
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </>
        )}
        {activeTab === 'calendar' && <CalendarView />}
      </div>

      {showNotif && <NotificationPanel onClose={() => setShowNotif(false)} />}
      {showAdd && <AddProjectModal onClose={() => setShowAdd(false)} />}
      {showSettings && <SettingsModal onClose={() => setShowSettings(false)} />}
      <ProjectDetail />
    </div>
  );
}

// ── Anthony Dashboard ──────────────────────────────────────────────────────────
function AnthonyDashboard() {
  const { projects, setSelectedProject, advanceStatus, logout, getTeamName, getWorkflow } = useContext(AppContext);
  const [view, setView] = useState('queue');

  const myProjects = projects.filter(p => ANTHONY_STAGES.includes(p.status) && p.type === 'youtube');

  const getAnthonyAction = (proj) => {

    if (proj.status === 'Revision Requested') return 'Resubmit for Review';
    return null;
  };

  return (
    <div style={{ minHeight: '100vh', background: '#0c0c0e' }}>
      <div style={{ borderBottom: '1px solid rgba(255,255,255,.07)', padding: '0 24px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', height: 54, position: 'sticky', top: 0, background: '#0c0c0e', zIndex: 30 }}>

          <div className="font-display" style={{ fontSize: 18, color: '#60a5fa' }}>Storyboard</div>
          <div style={{ display: 'flex', gap: 2 }}>
            {[{ id: 'queue', label: 'Queue' }, { id: 'calendar', label: 'Calendar' }].map(t => (
              <button key={t.id} onClick={() => setView(t.id)} style={{ padding: '6px 14px', borderRadius: 6, background: view === t.id ? 'rgba(255,255,255,.07)' : 'transparent', border: 'none', color: view === t.id ? '#f4f4f5' : '#71717a', fontSize: 13 }}>
                {t.label}
              </button>
            ))}
          </div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          {/* User chip */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '4px 10px', background: 'rgba(96,165,250,.08)', border: '1px solid rgba(96,165,250,.2)', borderRadius: 20 }}>
            <div style={{ width: 20, height: 20, borderRadius: 10, background: '#60a5fa', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, fontWeight: 700, color: '#0c0c0e' }}>
              {getTeamName('anthony')[0]}
            </div>
            <span style={{ fontSize: 12, color: '#60a5fa', fontWeight: 500 }}>{getTeamName('anthony')}</span>
          </div>
          <button onClick={logout} style={{ background: 'none', border: 'none', color: '#52525b', fontSize: 12 }}>Sign out</button>
        </div>
      </div>

      <div style={{ padding: '20px 24px', maxWidth: 800, margin: '0 auto' }}>
        {view === 'queue' && (
          <>
            <div style={{ marginBottom: 20 }}>
              <div className="font-display" style={{ fontSize: 24, color: '#f4f4f5', marginBottom: 4 }}>Your Edit Queue</div>
              <div style={{ fontSize: 13, color: '#52525b' }}>
                {new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
              </div>
            </div>
            {/* My Tasks — active editing */}
            {myProjects.filter(p => p.status === 'Editing in Progress' || p.status === 'Revision Requested').length > 0 && (
              <div style={{ marginBottom: 20 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
                  <div style={{ width: 8, height: 8, borderRadius: 4, background: '#60a5fa' }} />
                  <div style={{ fontSize: 13, fontWeight: 600, color: '#f4f4f5' }}>My Active Tasks</div>
                  <span style={{ background: 'rgba(96,165,250,.2)', color: '#60a5fa', fontSize: 11, fontWeight: 700, borderRadius: 10, padding: '1px 7px' }}>
                    {myProjects.filter(p => p.status === 'Editing in Progress' || p.status === 'Revision Requested').length}
                  </span>
                </div>
                {myProjects.filter(p => p.status === 'Editing in Progress' || p.status === 'Revision Requested').map(p => (
                  <div key={p.id} className="card" style={{ padding: '12px 16px', marginBottom: 8, cursor: 'pointer', borderColor: p.status === 'Revision Requested' ? 'rgba(248,113,113,.25)' : 'rgba(96,165,250,.2)', background: p.status === 'Revision Requested' ? 'rgba(248,113,113,.04)' : 'rgba(96,165,250,.04)' }} onClick={() => setSelectedProject(p)}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <PlatformIcon type={p.type} size={14} />
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 13, fontWeight: 600, color: '#f4f4f5' }}>{p.title}</div>
                        <div style={{ fontSize: 11, color: '#71717a', marginTop: 1 }}>{TYPE_LABELS[p.type]}</div>
                      </div>
                      <StatusBadge status={p.status} />
                    </div>
                  </div>
                ))}
              </div>
            )}

            {myProjects.length === 0 ? (
              <div className="card" style={{ padding: 32, textAlign: 'center' }}>
                <div style={{ fontSize: 32, marginBottom: 12 }}>✓</div>
                <div style={{ fontSize: 16, fontWeight: 600, color: '#f4f4f5', marginBottom: 6 }}>All caught up!</div>
                <div style={{ fontSize: 13, color: '#71717a' }}>No projects need editing right now.</div>
              </div>
            ) : myProjects.map(p => {
              const action = getAnthonyAction(p);
              return (
                <div key={p.id} className="card" style={{ padding: '16px 20px', marginBottom: 12, cursor: 'pointer' }} onClick={() => setSelectedProject(p)}>
                  <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 8 }}>
                    <div>
                      <div style={{ fontSize: 15, fontWeight: 600, color: '#f4f4f5', marginBottom: 4 }}>{p.title}</div>
                      <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
                        <PlatformIcon type={p.type} size={13} />
                        <span style={{ fontSize: 12, color: '#71717a' }}>{TYPE_LABELS[p.type]}</span>
                        <span style={{ color: '#27272a' }}>·</span>
                        <span style={{ fontSize: 12, color: '#71717a' }}>{formatDateStr(p.publishDate)}</span>
                      </div>
                    </div>
                    <StatusBadge status={p.status} />
                  </div>
                  {p.status === 'Revision Requested' && p.notes && (
                    <div style={{ background: 'rgba(248,113,113,.07)', border: '1px solid rgba(248,113,113,.2)', borderRadius: 8, padding: '8px 12px', marginBottom: 10, fontSize: 12, color: '#fca5a5', lineHeight: 1.5 }}>
                      <span style={{ fontWeight: 600 }}>Notes: </span>{p.notes}
                    </div>
                  )}
                  {p.dropbox && (
                    <a href={p.dropbox} target="_blank" rel="noopener noreferrer" onClick={e => e.stopPropagation()} style={{ fontSize: 12, color: '#f59e0b', display: 'block', marginBottom: 8 }}>Open in Dropbox →</a>
                  )}
                  {action && (
                    <button className="btn-amber" onClick={e => { e.stopPropagation(); advanceStatus(p.id, 'Edit Review', 'anthony'); }} style={{ fontSize: 12 }}>
                      {action}
                    </button>
                  )}
                </div>
              );
            })}
          </>
        )}
        {view === 'calendar' && <CalendarView filterType="youtube" />}
      </div>
      <ProjectDetail />
    </div>
  );
}

            {/* Scheduled */}
            {scheduled.length > 0 && (
              <div style={{ marginBottom: 20 }}>
                <div style={{ fontSize: 12, fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase', color: '#facc15', marginBottom: 10 }}>Scheduled</div>
                {scheduled.map(p => (
                  <div key={p.id} className="card" style={{ padding: '14px 16px', marginBottom: 8, cursor: 'pointer' }} onClick={() => setSelectedProject(p)}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <PlatformIcon type={p.type} size={14} />
                      <span style={{ fontSize: 13, fontWeight: 600, color: '#f4f4f5', flex: 1 }}>{p.title}</span>
                      <span style={{ fontSize: 11, color: '#71717a' }}>
                        {p.scheduledTime ? new Date(p.scheduledTime).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }) : formatDateStr(p.publishDate)}
                      </span>
                      <StatusBadge status={p.status} />
                    </div>
                  </div>
                ))}
              </div>
            )}

            {captionProjects.length === 0 && readyToPost.length === 0 && scheduled.length === 0 && (
              <div className="card" style={{ padding: 32, textAlign: 'center' }}>
                <div style={{ fontSize: 32, marginBottom: 12 }}>✓</div>
                <div style={{ fontSize: 16, fontWeight: 600, color: '#f4f4f5', marginBottom: 6 }}>All caught up!</div>
                <div style={{ fontSize: 13, color: '#71717a' }}>No items in your queue right now.</div>
              </div>
            )}
          </>
        )}
        {view === 'calendar' && <CalendarView />}
      </div>
      {showAdd && <AddProjectModal onClose={() => setShowAdd(false)} limitTypes={['instagram', 'tiktok', 'newsletter']} />}
      <ProjectDetail />
    </div>
  );
}

// ── Banner system ──────────────────────────────────────────────────────────────
function BannerContainer() {
  const { banners } = useContext(AppContext);
  if (!banners || banners.length === 0) return null;
  const bannerColors = { success: '#4ade80', error: '#f87171', warning: '#f59e0b', info: '#60a5fa' };
  return (
    <div style={{ position: 'fixed', top: 16, left: '50%', transform: 'translateX(-50%)', zIndex: 200, display: 'flex', flexDirection: 'column', gap: 8, alignItems: 'center' }}>
      {banners.map(b => (
        <div key={b.id} className="banner" style={{
          background: '#1a1a1e',
          border: `1px solid ${(bannerColors[b.type] || '#a1a1aa')}40`,
          borderLeft: `3px solid ${bannerColors[b.type] || '#a1a1aa'}`,
          color: '#f4f4f5',
          padding: '10px 20px',
          borderRadius: 8,
          fontSize: 13,
          fontWeight: 500,
          boxShadow: '0 8px 32px rgba(0,0,0,.4)',
          whiteSpace: 'nowrap'
        }}>
          {b.message}
        </div>
      ))}
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────────────────
function App() {
  const { currentUser } = useContext(AppContext);
  return (
    <>
      <BannerContainer />
      {!currentUser && <Login />}
      {currentUser?.role === 'creator' && <JoelDashboard />}
      {currentUser?.role === 'editor' && <AnthonyDashboard />}
      {currentUser?.role === 'social' && <TianaDashboard />}
      {currentUser && !['creator','editor','social'].includes(currentUser.role) && <Login />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <AppProvider><App /></AppProvider>
);
</script>
</body>
</html>
