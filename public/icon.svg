<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Board body -->
  <rect x="6" y="20" width="52" height="36" rx="4" ry="4" fill="#141418" stroke="#f59e0b" stroke-width="2.5"/>

  <!-- Clapper top (closed, angled stripes) -->
  <rect x="6" y="10" width="52" height="12" rx="3" ry="3" fill="#1a1a20" stroke="#f59e0b" stroke-width="2.5"/>

  <!-- Clapper stripe pattern -->
  <clipPath id="topClip">
    <rect x="6" y="10" width="52" height="12" rx="3" ry="3"/>
  </clipPath>
  <g clip-path="url(#topClip)">
    <rect x="6"  y="10" width="9"  height="12" fill="#f59e0b"/>
    <rect x="24" y="10" width="9"  height="12" fill="#f59e0b"/>
    <rect x="42" y="10" width="9"  height="12" fill="#f59e0b"/>
  </g>

  <!-- Hinge line between top and body -->
  <line x1="6" y1="22" x2="58" y2="22" stroke="#f59e0b" stroke-width="2"/>

  <!-- Body lines (scene info) -->
  <line x1="14" y1="32" x2="50" y2="32" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="14" y1="40" x2="40" y2="40" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="14" y1="48" x2="34" y2="48" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
</svg>
